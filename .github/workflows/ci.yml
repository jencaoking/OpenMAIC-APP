name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, feat/maic-editor-v0, feat/maic-editor-v1, runtime-server-backend]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ==================== Web Quality Checks ====================
  web-check:
    name: Web - Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: i18n Key Alignment
        run: pnpm check:i18n-keys

      - name: Unit Tests (root)
        run: pnpm test

      - name: Unit Tests (importer)
        run: pnpm --filter @openmaic/importer test

      - name: Unit Tests (dsl)
        run: pnpm --filter @openmaic/dsl test

      - name: Unit Tests (storage)
        run: pnpm --filter @openmaic/storage test

  # ==================== Mobile (Expo) Quality Checks ====================
  expo-check:
    name: Mobile - Typecheck & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript TypeCheck (Expo)
        working-directory: apps/expo
        run: pnpm run typecheck

      - name: Jest Unit Tests (Expo)
        working-directory: apps/expo
        run: npx jest --passWithNoTests --coverage --ci

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-coverage
          path: apps/expo/coverage/
          retention-days: 7

  # ==================== E2E Tests ====================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [web-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ==================== Build Verification ====================
  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web-check, expo-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm build

      - name: Verify Expo Build (dry run)
        working-directory: apps/expo
        run: npx expo export --platform web --output-dir /tmp/expo-export
        continue-on-error: true
