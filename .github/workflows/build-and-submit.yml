# Phase 7.4 GitHub Actions — OpenMAIC Expo Build & Submit Pipeline
#
# 触发条件：
#   1. 推送正式版 tag (v*.*.*, 不含 -beta/-rc) → 触发生产构建 + 自动提审
#   2. 推送预发布 tag (v*.*.*-beta*, v*.*.*-rc*) → 由 auto-build-apk.yml 处理
#   3. 推送 main 分支 → 触发 EAS Update OTA 推送
#   4. Pull Request → 仅运行类型检查 + 单元测试
#
# 流水线阶段：
#   1. quality  - TypeScript 类型检查 + ESLint
#   2. test     - Jest 单元测试 + Maestro E2E（仅 tag 触发）
#   3. build    - EAS Build (production/preview profile, iOS + Android)
#   4. submit   - EAS Submit (App Store + Google Play)
#   5. ota      - EAS Update (JS-only 热更新)
#   6. rollback - 手动触发的紧急回滚

name: Build & Submit

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota
          - rollback
          - build-preview
          - build-production

permissions:
  contents: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  EAS_VERSION: latest
  EXPO_DIR: apps/expo

jobs:
  # ============================================================
  # 阶段 1: 代码质量检查（所有触发条件都运行）
  # ============================================================
  quality:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check
        working-directory: ${{ env.EXPO_DIR }}
        run: pnpm run typecheck

      - name: ESLint (Web)
        if: github.event_name == 'pull_request'
        run: pnpm run lint

  # ============================================================
  # 阶段 2: 单元测试（PR + main + tag 触发）
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest unit tests
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          npx jest --passWithNoTests --coverage --ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ env.EXPO_DIR }}/coverage/
          retention-days: 7

  # ============================================================
  # 阶段 3: 生产构建（仅正式版 tag 触发或手动选择）
  # 排除预发布版本 (-beta/-rc)
  # ============================================================
  build-production:
    name: Build Production (iOS + Android)
    runs-on: ubuntu-latest
    needs: [quality, test]
    timeout-minutes: 120
    if: >-
      (startsWith(github.ref, 'refs/tags/v') &&
       !contains(github.ref_name, '-beta') &&
       !contains(github.ref_name, '-rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build-production')
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          echo "SENTRY_CONFIGURED=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: EAS Build (${{ matrix.platform }})
        id: eas-build
        working-directory: ${{ env.EXPO_DIR }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -e
          echo "=== Starting EAS Build with profile: production ==="
          BUILD_OUTPUT=$(eas build --profile production --platform ${{ matrix.platform }} --non-interactive --no-wait --json 2>/dev/null)
          echo "$BUILD_OUTPUT"

          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r '.[0].id // .id')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "ERROR: Could not extract BUILD_ID from output!"
            exit 1
          fi

          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build submitted with ID: $BUILD_ID"

      - name: Wait for build completion
        id: wait-build
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          BUILD_ID="${{ steps.eas-build.outputs.BUILD_ID }}"
          MAX_RETRIES=60
          RETRY_DELAY=60

          echo "Waiting for build $BUILD_ID to complete..."

          for i in $(seq 1 $MAX_RETRIES); do
            BUILD_STATUS=$(eas build:view "$BUILD_ID" --json 2>/dev/null | jq -r '.[0].status // .status')
            echo "Attempt $i/$MAX_RETRIES - Build status: $BUILD_STATUS"

            case "$BUILD_STATUS" in
              "finished")
                echo "Build completed successfully!"
                echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
                exit 0
                ;;
              "errored")
                echo "Build failed!"
                echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
                exit 1
                ;;
              "canceled")
                echo "Build canceled!"
                echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
                exit 1
                ;;
            esac

            sleep $RETRY_DELAY
          done

          echo "Timeout waiting for build completion!"
          echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
          exit 1

  # ============================================================
  # 阶段 3b: Preview 构建（手动触发）
  # ============================================================
  build-preview:
    name: Build Preview (iOS + Android)
    runs-on: ubuntu-latest
    needs: [quality, test]
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build-preview'
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build Preview (${{ matrix.platform }})
        id: eas-build-preview
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          echo "=== Starting EAS Build with profile: preview ==="
          BUILD_OUTPUT=$(eas build --profile preview --platform ${{ matrix.platform }} --non-interactive --no-wait --json 2>/dev/null)
          echo "$BUILD_OUTPUT"

          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r '.[0].id // .id')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "ERROR: Could not extract BUILD_ID from output!"
            exit 1
          fi

          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Preview build submitted with ID: $BUILD_ID"

      - name: Wait for preview build completion
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          BUILD_ID="${{ steps.eas-build-preview.outputs.BUILD_ID }}"
          MAX_RETRIES=60
          RETRY_DELAY=60

          echo "Waiting for preview build $BUILD_ID to complete..."

          for i in $(seq 1 $MAX_RETRIES); do
            BUILD_STATUS=$(eas build:view "$BUILD_ID" --json 2>/dev/null | jq -r '.[0].status // .status')
            echo "Attempt $i/$MAX_RETRIES - Build status: $BUILD_STATUS"

            case "$BUILD_STATUS" in
              "finished")
                echo "Preview build completed successfully!"
                exit 0
                ;;
              "errored")
                echo "Preview build failed!"
                exit 1
                ;;
              "canceled")
                echo "Preview build canceled!"
                exit 1
                ;;
            esac

            sleep $RETRY_DELAY
          done

          echo "Timeout waiting for preview build completion!"
          exit 1

  # ============================================================
  # 阶段 4: 自动提审（仅正式版生产构建完成后）
  # ============================================================
  submit:
    name: Submit to App Stores
    runs-on: ubuntu-latest
    needs: build-production
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref_name, '-beta') &&
      !contains(github.ref_name, '-rc')
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to ${{ matrix.platform }}
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          eas submit --platform ${{ matrix.platform }} --profile production --latest --non-interactive
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

  # ============================================================
  # 阶段 5: EAS Update OTA 热更新（main 分支推送或手动触发）
  # ============================================================
  ota-update:
    name: Push EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: quality
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'ota')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          eas update --branch production --message "Auto OTA update from commit ${{ github.sha }}"

  # ============================================================
  # 阶段 6: 紧急回滚（手动触发，真正执行回滚）
  # ============================================================
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: List recent OTA updates
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          echo "Recent EAS Update branches:"
          eas update:list --branch production --limit 10

      - name: Rollback to previous update
        id: rollback-update
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          echo "=== Retrieving update list ==="
          UPDATE_LIST=$(eas update:list --branch production --limit 5 --json 2>/dev/null)
          echo "$UPDATE_LIST"

          PREVIOUS_UPDATE_ID=$(echo "$UPDATE_LIST" | jq -r '.[1].id')
          echo "Previous update ID: $PREVIOUS_UPDATE_ID"

          if [ -z "$PREVIOUS_UPDATE_ID" ] || [ "$PREVIOUS_UPDATE_ID" = "null" ]; then
            echo "::error::Could not find previous update ID to rollback to!"
            exit 1
          fi

          echo "PREVIOUS_UPDATE_ID=$PREVIOUS_UPDATE_ID" >> $GITHUB_OUTPUT

      - name: Execute rollback
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          echo "=== Rolling back to update: ${{ steps.rollback-update.outputs.PREVIOUS_UPDATE_ID }} ==="
          eas update --branch production --rollback-to ${{ steps.rollback-update.outputs.PREVIOUS_UPDATE_ID }}
          echo "Rollback completed successfully!"