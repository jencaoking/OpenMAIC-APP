# Phase 7.4 GitHub Actions — OpenMAIC Expo Build & Submit Pipeline
#
# 触发条件：
#   1. 推送 tag (v*.*.*) → 触发生产构建 + 自动提审
#   2. 推送 main 分支 → 触发 EAS Update OTA 推送
#   3. Pull Request → 仅运行类型检查 + 单元测试
#
# 流水线阶段：
#   1. quality  - TypeScript 类型检查 + ESLint
#   2. test     - Jest 单元测试 + Maestro E2E（仅 tag 触发）
#   3. build    - EAS Build (production profile, iOS + Android)
#   4. submit   - EAS Submit (App Store + Google Play)
#   5. ota      - EAS Update (JS-only 热更新)
#   6. rollback - 手动触发的紧急回滚

name: Build & Submit

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota
          - rollback
          - build-preview
          - build-production

permissions:
  contents: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  EAS_VERSION: latest
  EXPO_DIR: apps/expo

jobs:
  # ============================================================
  # 阶段 1: 代码质量检查（所有触发条件都运行）
  # ============================================================
  quality:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check
        working-directory: ${{ env.EXPO_DIR }}
        run: pnpm run typecheck

      - name: ESLint (Web)
        if: github.event_name == 'pull_request'
        run: pnpm run lint

  # ============================================================
  # 阶段 2: 单元测试（PR + main + tag 触发）
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest unit tests
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          npx jest --passWithNoTests --coverage --ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ env.EXPO_DIR }}/coverage/
          retention-days: 7

  # ============================================================
  # 阶段 3: 生产构建（仅 tag 触发或手动选择）
  # ============================================================
  build-production:
    name: Build Production (iOS + Android)
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build-production')
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          echo "SENTRY_CONFIGURED=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: EAS Build (${{ matrix.platform }})
        working-directory: ${{ env.EXPO_DIR }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          eas build --profile production --platform ${{ matrix.platform }} --non-interactive --no-wait

      - name: Wait for build completion
        id: wait-build
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          echo "Build submitted. Use EAS dashboard to monitor progress."
          echo "::notice::Build submitted to EAS. Check https://expo.dev/accounts/jencaoking/projects/openmaic-expo/builds"

  # ============================================================
  # 阶段 4: 自动提审（构建完成后）
  # ============================================================
  submit:
    name: Submit to App Stores
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to ${{ matrix.platform }}
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          eas submit --platform ${{ matrix.platform }} --profile production --latest --non-interactive
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          slack-message: |
            OpenMAIC Expo Build & Submit
            Tag: ${{ github.ref_name }}
            Platform: ${{ matrix.platform }}
            Status: ${{ job.status }}
            URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================
  # 阶段 5: EAS Update OTA 热更新（main 分支推送）
  # ============================================================
  ota-update:
    name: Push EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          eas update --branch production --message "Auto OTA update from commit ${{ github.sha }}"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          slack-message: |
            OpenMAIC OTA Update Pushed
            Branch: main
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================
  # 阶段 6: 紧急回滚（手动触发）
  # ============================================================
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: List recent OTA updates
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          echo "Recent EAS Update branches:"
          eas update:list --branch production --limit 10

      - name: Rollback to previous update
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          # 列出最近 2 个 update，将上一个标记为最新
          echo "::warning::Manual rollback required. Please run:"
          echo "::warning::eas update --branch production --rollback-to <previous-update-id>"
        continue-on-error: true

      - name: Notify Slack (Critical)
        uses: slackapi/slack-github-action@v1
        with:
          slack-message: |
            🚨 OpenMAIC EMERGENCY ROLLBACK 🚨
            Triggered by: ${{ github.actor }}
            Reason: Manual trigger from GitHub Actions
            URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
