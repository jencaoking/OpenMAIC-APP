name: Expo Build & OTA

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'apps/expo/**'
      - 'packages/@openmaic/**'
    types:
      - labeled
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'build-preview'
        type: choice
        options:
          - build-preview
          - build-development
          - ota
          - rollback

permissions:
  contents: write
  packages: read

concurrency:
  group: expo-build-${{ github.ref }}-${{ github.event.inputs.action || 'default' }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  EAS_VERSION: latest
  EXPO_DIR: apps/expo
  APK_OUTPUT_DIR: ${{ github.workspace }}/apk-build

jobs:
  quality:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build:apk'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check (Expo)
        working-directory: ${{ env.EXPO_DIR }}
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest unit tests
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          npx jest --passWithNoTests --coverage --ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ env.EXPO_DIR }}/coverage/
          retention-days: 7

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [quality, test]
    timeout-minutes: 60
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'build-preview' || github.event.inputs.action == 'build-development')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build:apk'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: build-profile
        run: |
          if [ "${{ github.event_name }}" = "push" ] && startsWith "${{ github.ref }}" "refs/tags/v"; then
            PROFILE="preview"
          elif [ "${{ github.event.inputs.action }}" = "build-development" ]; then
            PROFILE="development"
          else
            PROFILE="preview"
          fi
          echo "BUILD_PROFILE=$PROFILE" >> $GITHUB_OUTPUT

      - name: EAS Build Android APK
        id: eas-build
        working-directory: ${{ env.EXPO_DIR }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -e
          echo "=== Starting EAS Build with profile: ${{ steps.build-profile.outputs.BUILD_PROFILE }} ==="
          BUILD_OUTPUT=$(eas build --profile ${{ steps.build-profile.outputs.BUILD_PROFILE }} --platform android --non-interactive --no-wait --json 2>/dev/null)
          echo "$BUILD_OUTPUT"

          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r '.[0].id // .id')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "ERROR: Could not extract BUILD_ID from output!"
            echo "Full output:"
            echo "$BUILD_OUTPUT"
            exit 1
          fi

          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build submitted with ID: $BUILD_ID"

      - name: Wait for build completion
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          BUILD_ID="${{ steps.eas-build.outputs.BUILD_ID }}"
          MAX_RETRIES=60
          RETRY_DELAY=60

          echo "Waiting for build $BUILD_ID to complete..."

          for i in $(seq 1 $MAX_RETRIES); do
            BUILD_STATUS=$(eas build:view "$BUILD_ID" --json 2>/dev/null | jq -r '.[0].status // .status')
            echo "Attempt $i/$MAX_RETRIES - Build status: $BUILD_STATUS"

            case "$BUILD_STATUS" in
              "finished")
                echo "Build completed successfully!"
                exit 0
                ;;
              "errored")
                echo "Build failed!"
                exit 1
                ;;
              "canceled")
                echo "Build canceled!"
                exit 1
                ;;
            esac

            sleep $RETRY_DELAY
          done

          echo "Timeout waiting for build completion!"
          exit 1

      - name: Create output directory
        run: mkdir -p ${{ env.APK_OUTPUT_DIR }}

      - name: Download APK artifact
        id: download-apk
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          eas build:download --platform android --build-id ${{ steps.eas-build.outputs.BUILD_ID }} --output ${{ env.APK_OUTPUT_DIR }}/app.apk
          ls -la ${{ env.APK_OUTPUT_DIR }}/

      - name: Verify APK exists
        id: verify-apk
        run: |
          if [ -f "${{ env.APK_OUTPUT_DIR }}/app.apk" ]; then
            echo "APK_FILE=${{ env.APK_OUTPUT_DIR }}/app.apk" >> $GITHUB_OUTPUT
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
          else
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload APK to GitHub Artifacts
        if: steps.verify-apk.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openmaic-apk-${{ steps.build-profile.outputs.BUILD_PROFILE }}
          path: ${{ env.APK_OUTPUT_DIR }}/*.apk
          retention-days: 30

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v') && steps.verify-apk.outputs.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            📱 Android APK Build
            - Profile: ${{ steps.build-profile.outputs.BUILD_PROFILE }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          files: ${{ env.APK_OUTPUT_DIR }}/*.apk

      - name: Notify on Discord (tag only)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@v0.3.2
        with:
          args: |
            🚀 OpenMAIC APK Build Completed!
            - Profile: ${{ steps.build-profile.outputs.BUILD_PROFILE }}
            - Tag: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Download: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        continue-on-error: true

  ota-update:
    name: Push EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: quality
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'ota')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          eas update --branch production --message "Auto OTA update from commit ${{ github.sha }}"

  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: ${{ env.EAS_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: List recent OTA updates
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          echo "Recent EAS Update branches:"
          eas update:list --branch production --limit 10

      - name: Rollback to previous update
        id: rollback-update
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          echo "=== Retrieving update list ==="
          UPDATE_LIST=$(eas update:list --branch production --limit 5 --json 2>/dev/null)
          echo "$UPDATE_LIST"

          PREVIOUS_UPDATE_ID=$(echo "$UPDATE_LIST" | jq -r '.[1].id')
          echo "Previous update ID: $PREVIOUS_UPDATE_ID"

          if [ -z "$PREVIOUS_UPDATE_ID" ] || [ "$PREVIOUS_UPDATE_ID" = "null" ]; then
            echo "::error::Could not find previous update ID to rollback to!"
            exit 1
          fi

          echo "PREVIOUS_UPDATE_ID=$PREVIOUS_UPDATE_ID" >> $GITHUB_OUTPUT

      - name: Execute rollback
        working-directory: ${{ env.EXPO_DIR }}
        run: |
          set -e
          echo "=== Rolling back to update: ${{ steps.rollback-update.outputs.PREVIOUS_UPDATE_ID }} ==="
          eas update --branch production --rollback-to ${{ steps.rollback-update.outputs.PREVIOUS_UPDATE_ID }}
          echo "Rollback completed successfully!"