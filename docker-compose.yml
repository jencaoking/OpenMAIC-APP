services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - openmaic-network

  storage-server:
    build:
      context: .
      dockerfile: Dockerfile.storage-server
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openmaic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      storage-server:
        condition: service_healthy
    volumes:
      - openmaic-data:/app/data
    restart: unless-stopped
    networks:
      - openmaic-network

volumes:
  postgres-data:
  openmaic-data:

networks:
  openmaic-network:
    driver: bridge