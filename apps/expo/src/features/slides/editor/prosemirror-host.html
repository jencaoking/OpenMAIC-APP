<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #editor { width: 100%; height: 100%; outline: none; cursor: text; overflow: auto; }
  #editor:focus, #editor:focus-visible { outline: none; }
  #editor p { margin: 0; }
  #editor ul { list-style: disc outside !important; padding-inline-start: 1.5rem !important; }
  #editor ol { list-style: decimal outside !important; padding-inline-start: 1.5rem !important; }
  #editor li { display: list-item !important; }
  #editor blockquote { border-left: 3px solid #ccc; padding-left: 12px; margin: 4px 0; }
  #editor a { color: #4a90d9; text-decoration: underline; }
  #editor code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-family: monospace; }
  #editor [data-placeholder]::before {
    content: attr(data-placeholder);
    color: #aaa;
    position: absolute;
    pointer-events: none;
  }
  .format-painter { cursor: crosshair !important; }
</style>
</head>
<body>
<div id="editor" contenteditable="false"></div>

<script src="https://unpkg.com/prosemirror-inputrules@1.5.1/dist/index.js"></script>
<script src="https://unpkg.com/prosemirror-schema-basic@1.2.4/dist/index.js"></script>

<script src="https://unpkg.com/prosemirror-gapcursor@1.4.0/dist/index.js"></script>

    attrs: { align: { default: '' }, indent: { default: 0 }, textIndent: { default: 0 } },

  };

    attrs: { backcolor: {} }, inline: true, group: 'inline',
    parseDOM: [{ style: 'background-color', getAttrs: c => c ? { backcolor: c } : {} }],
    toDOM(mark) { const { backcolor } = mark.attrs; return ['span', { style: backcolor ? 'background-color:' + backcolor + ';' : '' }, 0]; },
  };
  const fontsize = {
    attrs: { fontsize: {} }, inline: true, group: 'inline',
    parseDOM: [{ style: 'font-size', getAttrs: s => s ? { fontsize: s } : {} }],
    toDOM(mark) { const { fontsize: s } = mark.attrs; return ['span', { style: s ? 'font-size:' + s + ';' : '' }, 0]; },

        },
      },
      editable: () => editable,
      dispatchTransaction(tr) {
        const newState = this.state.apply(tr);
        this.updateState(newState);
        if (tr.selectionSet || tr.docChanged || tr.storedMarksSet) {
          postMessage({ type: 'attrs', attrs: getTextAttrs(editorView) });
        }
      },
    });
    currentContent = editorView.dom.innerHTML;
  }

  function updateContent(content) {
    if (!editorView) return;
    if (editorView.hasFocus()) return;
    const { doc, tr } = editorView.state;
    editorView.dispatch(tr.replaceRangeWith(0, doc.content.size, createDocument(content)));
    currentContent = editorView.dom.innerHTML;
  }

  function setEditable(editable) {
    if (!editorView) return;
    editorView.setProps({ editable: () => editable });
  }

  // ── Command execution ──
  function execCommand(payload) {
    if (!editorView) return;
    const { command, value } = payload;
    const view = editorView;
    const s = view.state;
    const marks = s.schema.marks;

    switch (command) {
      case 'fontname':
        autoSelectAll(view);
        addMark(view, marks.fontname.create({ fontname: value }));
        break;
      case 'fontsize':
        autoSelectAll(view);
        addMark(view, marks.fontsize.create({ fontsize: value }));
        setListStyle(view, { key: 'fontsize', value });
        break;
      case 'fontsize-add': {
        const step = value ? +value : 2;
        autoSelectAll(view);
        const fs = getFontsize(view) + step + 'px';
        addMark(view, marks.fontsize.create({ fontsize: fs }));
        setListStyle(view, { key: 'fontsize', value: fs });
        break;
      }
      case 'fontsize-reduce': {
        const step = value ? +value : 2;
        autoSelectAll(view);
        let fs = getFontsize(view) - step;
        if (fs < 12) fs = 12;
        addMark(view, marks.fontsize.create({ fontsize: fs + 'px' }));
        setListStyle(view, { key: 'fontsize', value: fs + 'px' });
        break;
      }
      case 'color':
        autoSelectAll(view);
        addMark(view, marks.forecolor.create({ color: value }));
        setListStyle(view, { key: 'color', value });
        break;
      case 'backcolor':
        autoSelectAll(view);
        addMark(view, marks.backcolor.create({ backcolor: value }));
        break;
      case 'bold':
        autoSelectAll(view);
        toggleMark(marks.strong)(s, view.dispatch);
        break;
      case 'em':
        autoSelectAll(view);
        toggleMark(marks.em)(s, view.dispatch);
        break;
      case 'underline':
        autoSelectAll(view);
        toggleMark(marks.underline)(s, view.dispatch);
        break;
      case 'strikethrough':
        autoSelectAll(view);
        toggleMark(marks.strikethrough)(s, view.dispatch);
        break;
      case 'subscript':
        toggleMark(marks.subscript)(s, view.dispatch);
        break;
      case 'superscript':
        toggleMark(marks.superscript)(s, view.dispatch);
        break;
      case 'blockquote':
        if (isActiveOfParentNodeType('blockquote', s)) lift(s, view.dispatch);
        else wrapIn(s.schema.nodes.blockquote)(s, view.dispatch);
        break;
      case 'code':
        toggleMark(marks.code)(s, view.dispatch);
        break;
      case 'align':
        alignmentCommand(view, value);
        break;
      case 'indent':
        indentCommand(view, +value);
        break;
      case 'textIndent':
        textIndentCommand(view, +value);
        break;
      case 'bulletList': {
        const { bullet_list: bl, list_item: li } = s.schema.nodes;
        toggleList(bl, li, value || '', {})(s, view.dispatch);
        break;
      }
      case 'orderedList': {
        const { ordered_list: ol, list_item: li } = s.schema.nodes;
        toggleList(ol, li, value || '', {})(s, view.dispatch);
        break;
      }
      case 'clear': {
        autoSelectAll(view);
        const { $from, $to } = view.state.selection;
        view.dispatch(view.state.tr.removeMark($from.pos, $to.pos));
        setListStyle(view, [{ key: 'fontsize', value: '' }, { key: 'color', value: '' }]);
        break;
      }
      case 'link': {
        const markType = marks.link;
        const { from, to } = s.selection;
        const result = findNodesWithSameMark(s.doc, from, to, markType);
        if (result) {
          if (value) addMark(view, marks.link.create({ href: value, title: value }), { from: result.from.pos, to: result.to.pos + 1 });
          else view.dispatch(view.state.tr.removeMark(result.from.pos, result.to.pos + 1, markType));
        } else if (markActive(s, markType)) {
          if (value) addMark(view, marks.link.create({ href: value, title: value }));
          else toggleMark(markType)(s, view.dispatch);
        } else if (value) {
          autoSelectAll(view);
          toggleMark(markType, { href: value, title: value })(view.state, view.dispatch);
        }
        break;
      }
      case 'replace':
        replaceText(view, value);
        break;
      case 'insert':
        view.dispatch(view.state.tr.insertText(value));
        break;
    }
    // Sync state after command
    view.focus();
    clearTimeout(window._changeTimer);
    window._changeTimer = setTimeout(() => {
      if (!editorView) return;
      const html = editorView.dom.innerHTML;
      if (html !== currentContent) { currentContent = html; postMessage({ type: 'change', html }); }
      postMessage({ type: 'attrs', attrs: getTextAttrs(editorView) });
    }, 50);
  }

  // ── Message handling ──
  window.addEventListener('message', (e) => {
    const data = e.data;
    if (!data || !data.type) return;
    switch (data.type) {
      case 'init':
        initEditor(data.content || '', data.editable !== false, data.placeholder || '');
        break;
      case 'update':
        updateContent(data.content || '');
        break;
      case 'editable':
        setEditable(data.editable);
        break;
      case 'command':
        execCommand(data.payload);
        break;
      case 'focus':
        if (editorView) editorView.focus();
        break;
    }
  });

  // Also support React Native WebView's postMessage (via window.ReactNativeWebView)
  window.addEventListener('message', (e) => {
    // RN WebView wraps messages differently
    if (e.nativeEvent && e.nativeEvent.data) {
      try {
        const data = JSON.parse(e.nativeEvent.data);
        if (data && data.type) {
          // Already handled by the above listener for direct postMessage
          // This handles RN WebView's specific message format
        }
      } catch (err) {}
    }
  });

  // Signal ready
  postMessage({ type: 'ready' });
})();
</script>
</body>
</html>
